
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a3a' : '#f0efff',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
  },
});

const { svg } = await mermaid.render('erd-svg', `erDiagram

  profiles {
    uuid id PK
    varchar username
    varchar display_name
    varchar avatar_url
    text bio
    boolean is_active
    timestamptz created_at
    timestamptz updated_at
  }

  artists {
    uuid id PK
    varchar name
    text bio
    varchar avatar_url
    timestamptz created_at
  }

  albums {
    uuid id PK
    uuid artist_id FK
    varchar title
    date release_date
    varchar cover_url
    timestamptz created_at
  }

  songs {
    uuid id PK
    uuid album_id FK
    varchar title
    integer duration_seconds
    varchar storage_key
    varchar storage_provider
    varchar public_url
    bigint file_size_bytes
    varchar mime_type
    smallint bitrate_kbps
    smallint track_number
    boolean is_explicit
    bigint play_count
    timestamptz created_at
  }

  song_artists {
    uuid song_id FK
    uuid artist_id FK
    varchar role
  }

  playlists {
    uuid id PK
    uuid user_id FK
    varchar name
    text description
    boolean is_public
    varchar type
    varchar cover_url
    timestamptz created_at
    timestamptz updated_at
  }

  playlist_songs {
    uuid playlist_id FK
    uuid song_id FK
    smallint position
    timestamptz added_at
  }

  play_history {
    uuid id PK
    uuid user_id FK
    uuid song_id FK
    uuid playlist_id FK
    integer duration_played_seconds
    timestamptz played_at
  }

  likes {
    uuid user_id FK
    uuid song_id FK
    timestamptz liked_at
  }

  profiles ||--o{ playlists : "crea"
  profiles ||--o{ play_history : "genera"
  profiles ||--o{ likes : "da"
  artists ||--o{ albums : "tiene"
  albums ||--o{ songs : "contiene"
  artists ||--o{ song_artists : "participa en"
  songs ||--o{ song_artists : "incluye"
  playlists ||--o{ playlist_songs : "agrupa"
  songs ||--o{ playlist_songs : "aparece en"
  songs ||--o{ play_history : "registrada en"
  songs ||--o{ likes : "recibe"
  playlists ||--o{ play_history : "contexto de"
`);

document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
